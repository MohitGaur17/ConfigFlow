version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: configflow_db
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: configflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d configflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Server
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: configflow_server
    environment:
      DATABASE_URL: postgresql://appuser:apppassword@postgres:5432/configflow
      JWT_SECRET: dev-jwt-secret-change-in-production
      PORT: 4000
      NODE_ENV: development
      CLIENT_URL: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server:/app/server
      - /app/server/node_modules
    command: npm run dev --workspace=server

  # Frontend Client (optional - usually run locally with npm run dev)
  # client:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.client
  #   container_name: configflow_client
  #   environment:
  #     NEXT_PUBLIC_API_URL: http://localhost:4000
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - server

volumes:
  postgres_data:

networks:
  default:
    name: configflow_network
