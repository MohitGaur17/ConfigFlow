<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <rect width="1920" height="1080" fill="#0A0A0A"/>
  <defs>
    <linearGradient id="heroGradWide" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Header -->
  <rect width="1920" height="80" fill="#000000" opacity="0.5"/>
  <text x="60" y="55" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">ConfigFlow</text>
  
  <!-- Hero section - left -->
  <rect x="60" y="150" width="800" height="600" fill="url(#heroGradWide)" rx="20" opacity="0.8"/>
  <text x="460" y="400" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">AI App Builder</text>
  <text x="460" y="460" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">Generate full-stack apps from JSON</text>
  
  <!-- Features - right -->
  <g x="900" y="150">
    <rect x="900" y="150" width="1000" height="150" fill="white" opacity="0.1" rx="12"/>
    <text x="920" y="210" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">⚡ Lightning Fast</text>
    <text x="920" y="240" font-family="Arial, sans-serif" font-size="14" fill="white/70">Generate production apps instantly</text>
    
    <rect x="900" y="330" width="1000" height="150" fill="white" opacity="0.1" rx="12"/>
    <text x="920" y="390" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">📱 Responsive Design</text>
    <text x="920" y="420" font-family="Arial, sans-serif" font-size="14" fill="white/70">Mobile-first PWA ready</text>
    
    <rect x="900" y="510" width="1000" height="150" fill="white" opacity="0.1" rx="12"/>
    <text x="920" y="570" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">🔧 Full Configuration</text>
    <text x="920" y="600" font-family="Arial, sans-serif" font-size="14" fill="white/70">Complete control over your app</text>
  </g>
  
  <!-- Buttons -->
  <rect x="60" y="870" width="220" height="70" fill="white" rx="12"/>
  <text x="170" y="915" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0A0A0A" text-anchor="middle">Get Started</text>
  
  <rect x="340" y="870" width="220" height="70" fill="url(#heroGradWide)" rx="12" opacity="0.8"/>
  <text x="450" y="915" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">Learn More</text>
</svg>
