<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 720" fill="none">
  <rect width="540" height="720" fill="#0A0A0A"/>
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Header -->
  <rect width="540" height="60" fill="#000000" opacity="0.5"/>
  <text x="30" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">Antigravity</text>
  
  <!-- Hero section -->
  <rect x="30" y="100" width="480" height="250" fill="url(#heroGrad)" rx="16" opacity="0.8"/>
  <text x="270" y="200" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">AI App Builder</text>
  <text x="270" y="240" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">Generate apps from JSON</text>
  
  <!-- Buttons -->
  <rect x="60" y="420" width="180" height="50" fill="white" rx="8"/>
  <text x="150" y="455" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A0A0A" text-anchor="middle">Generate</text>
  
  <rect x="300" y="420" width="180" height="50" fill="url(#heroGrad)" rx="8" opacity="0.8"/>
  <text x="390" y="455" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Dashboard</text>
</svg>
